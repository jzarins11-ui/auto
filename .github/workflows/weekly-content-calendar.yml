name: 📅 Weekly Content Calendar

on:
  schedule:
    # Every Monday at 7:00 AM UTC
    - cron: '0 7 * * 1'
  workflow_dispatch:
    # Also allow manual runs from the Actions tab

permissions:
  contents: write

jobs:
  generate-calendar:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: 🛎️ Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: 🐍 Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: 📦 Install dependencies
        run: pip install -r requirements.txt

      - name: 🗓️ Generate content calendar
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: python scripts/generate_content_calendar.py

      - name: 💾 Commit and push calendar
        run: |
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git config user.name "github-actions[bot]"
          git add content/calendars/
          git diff --staged --quiet && echo "Nothing new to commit" || \
            (git commit -m "🗓️ Auto-generated content calendar $(date +%Y-%m-%d)" && git push)
