name: Full Automation Pipeline

on:
  schedule:
    # Every Mon/Wed/Fri at 9:00 AM UTC
    - cron: '0 9 * * 1,3,5'
  workflow_dispatch:
    inputs:
      topic:
        description: 'Video topic (leave empty to use trend analysis)'
        required: false
        type: string
        default: ''
      video_type:
        description: 'Video type'
        required: true
        type: choice
        options:
          - tutorial
          - comparison
          - case-study
          - money-making
          - news
        default: tutorial
      keyword:
        description: 'Primary SEO keyword'
        required: false
        type: string
        default: ''
      privacy:
        description: 'YouTube privacy setting'
        required: true
        type: choice
        options:
          - public
          - unlisted
          - private
        default: unlisted
      upload:
        description: 'Upload to YouTube?'
        required: true
        type: boolean
        default: true

permissions:
  contents: write

jobs:
  full-pipeline:
    runs-on: ubuntu-latest
    timeout-minutes: 120
    defaults:
      run:
        working-directory: youtube-ai-channel

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install ffmpeg
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq ffmpeg

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run full automation pipeline
        env:
          DEEPSEEK_API_KEY: ${{ secrets.DEEPSEEK_API_KEY }}
          YOUTUBE_API_KEY: ${{ secrets.YOUTUBE_API_KEY }}
          YT_CLIENT_ID: ${{ secrets.YT_CLIENT_ID }}
          YT_CLIENT_SECRET: ${{ secrets.YT_CLIENT_SECRET }}
          YT_REFRESH_TOKEN: ${{ secrets.YT_REFRESH_TOKEN }}
          CI_TOPIC: ${{ github.event.inputs.topic }}
          CI_VIDEO_TYPE: ${{ github.event.inputs.video_type }}
          CI_KEYWORD: ${{ github.event.inputs.keyword }}
          CI_UPLOAD: ${{ github.event.inputs.upload }}
          CI_PRIVACY: ${{ github.event.inputs.privacy }}
        run: python scripts/full_automation.py

      - name: Upload artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: video-output
          path: |
            youtube-ai-channel/content/videos/
            youtube-ai-channel/content/thumbnails/
            youtube-ai-channel/content/audio/
            youtube-ai-channel/content/scripts/
          retention-days: 7
